{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "photobooth-api.mongodbName" . }}
  labels:
    {{- include "photobooth-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  serviceName: {{ include "photobooth-api.mongodbName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "photobooth-api.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "photobooth-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      {{- with .Values.mongodb.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mongodb
          {{- with .Values.mongodb.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.mongodb.image.digest }}
          image: "{{ .Values.mongodb.image.repository }}@{{ .Values.mongodb.image.digest }}"
          {{- else }}
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          {{- if .Values.mongodb.auth.enabled }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth" (include "photobooth-api.mongodbName" .)) .Values.mongodb.auth.secretName }}
                  key: {{ .Values.mongodb.auth.usernameKey }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth" (include "photobooth-api.mongodbName" .)) .Values.mongodb.auth.secretName }}
                  key: {{ .Values.mongodb.auth.passwordKey }}
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.auth.database | quote }}
          {{- end }}
          ports:
            - name: mongodb
              containerPort: {{ .Values.mongodb.service.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data/db
          {{- with .Values.mongodb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if not .Values.mongodb.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.mongodb.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        {{- $storageClassName := default .Values.storageClassName .Values.mongodb.persistence.storageClassName }}
        {{- if $storageClassName }}
        storageClassName: {{ $storageClassName | quote }}
        {{- end }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.mongodb.persistence.size }}
  {{- end }}
{{- end }}
