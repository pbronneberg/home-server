# Default values for bronneberg-org.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: bronneberg/photobooth-api
  pullPolicy: Always

api:
  s3:
    secretName: storage-user-photobooth

mongodb:
  enabled: true
  image:
    # Use dhi.io/mongodb here if the cluster has Docker Hardened Images registry access.
    repository: mongo
    tag: "8.0.21"
    pullPolicy: IfNotPresent
  service:
    port: 27017
  persistence:
    enabled: true
    storageClassName: ""
    size: 8Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

s3:
  mode: standalone
  replicas: 1
  rootUser: minio-root
  rootPassword: not-a-real-root-password
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
  serviceAccount:
    create: true
    name: photobooth-api-s3
  buckets:
    - name: photobooth
      policy: none
      purge: false
  users:
    - accessKey: photobooth
      secretKey: not-a-real-password
      policy: photobooth-policy
  policies:
    - name: photobooth-policy
      statements:
        - resources:
            - "arn:aws:s3:::photobooth"
          effect: "Allow"
          actions:
            - "s3:GetBucketLocation"
            - "s3:ListBucket"
            - "s3:ListBucketMultipartUploads"
        - resources:
            - "arn:aws:s3:::photobooth/*"
          effect: "Allow"
          actions:
            - "s3:AbortMultipartUpload"
            - "s3:DeleteObject"
            - "s3:GetObject"
            - "s3:ListMultipartUploadParts"
            - "s3:PutObject"
  service:
    port: "80"

  ingress:
    enabled: true
    hosts:
      - s3.apps.example.com
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
    tls:
      - hosts:
          - s3.apps.example.com
        secretName: s3.apps.example.com-tls
    
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
storageClassName: "local-path"

logLevel:
  default: "Information"
  aspnetcore: "Warning"

#environment: "Development"
environment: "Release"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

#podSecurityContext:
#  runAsUser: 1001
#  runAsGroup: 1001
#  fsGroup: 1001
#  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8080

basePath: "/api/v1"

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: "traefik"
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
  hosts:
    - host: photobooth.apps.example.com
      paths:
        - path: /api/v1
          pathType: ImplementationSpecific
  tls:
   - secretName: photobooth-nl-tls
     hosts:
       - photobooth.apps.example.com

resources:
  limits:
    cpu: 3
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
