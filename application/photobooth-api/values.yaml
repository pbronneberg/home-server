# Default values for bronneberg-org.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: bronneberg/photobooth-api
  pullPolicy: Always
  tag: ""
  digest: ""

api:
  s3:
    secretName: storage-user-photobooth

mongodb:
  enabled: true
  image:
    # Use dhi.io/mongodb here if the cluster has Docker Hardened Images registry access.
    repository: mongo
    tag: "8.0.21"
    digest: ""
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    secretName: ""
    rootUser: root
    rootPassword: not-a-real-mongodb-root-password
    usernameKey: mongodb-root-username
    passwordKey: mongodb-root-password
    database: photobooth
  # Existing PVC-backed MongoDB data needs a deliberate auth and ownership
  # migration before these can be enabled safely.
  podSecurityContext: null
  securityContext: null
  service:
    port: 27017
  persistence:
    enabled: true
    storageClassName: ""
    size: 8Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

s3:
  mode: standalone
  replicas: 1
  rootUser: minio-root
  rootPassword: not-a-real-root-password
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 256Mi
  serviceAccount:
    create: true
    name: photobooth-api-s3
  buckets:
    - name: photobooth
      policy: none
      purge: false
  users:
    - accessKey: photobooth
      secretKey: not-a-real-password
      policy: photobooth-policy
  policies:
    - name: photobooth-policy
      statements:
        - resources:
            - "arn:aws:s3:::photobooth"
          effect: "Allow"
          actions:
            - "s3:GetBucketLocation"
            - "s3:ListBucket"
            - "s3:ListBucketMultipartUploads"
        - resources:
            - "arn:aws:s3:::photobooth/*"
          effect: "Allow"
          actions:
            - "s3:AbortMultipartUpload"
            - "s3:DeleteObject"
            - "s3:GetObject"
            - "s3:ListMultipartUploadParts"
            - "s3:PutObject"
  service:
    port: "80"

  ingress:
    enabled: true
    ingressClassName: "traefik"
    hosts:
      - s3.apps.example.com
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,default-github-oauth@kubernetescrd
    tls:
      - hosts:
          - s3.apps.example.com
        secretName: s3.apps.example.com-tls
    
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
storageClassName: "local-path"

logLevel:
  default: "Information"
  aspnetcore: "Warning"

#environment: "Development"
environment: "Release"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  automountServiceAccountToken: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
#  runAsUser: 1001
#  runAsGroup: 1001
#  fsGroup: 1001
#  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 8080

basePath: "/api/v1"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
  hosts:
    - host: photobooth.apps.example.com
      paths:
        - path: /api/v1
          pathType: ImplementationSpecific
  tls:
   - secretName: photobooth-nl-tls
     hosts:
       - photobooth.apps.example.com

resources:
  limits:
    cpu: 3
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

networkPolicy:
  enabled: false
  ingressNamespace: kube-system
  monitoringNamespace: monitoring
