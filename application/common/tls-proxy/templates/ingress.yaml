{{- $fullName := include "tls-proxy.fullname" . -}}
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "tls-proxy.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  tls:
    - hosts:
    {{- range .Values.ingress.hostnames }}
        - {{ . }}
    {{- end }}
      secretName: {{ $fullName }}-tls
  rules:
    {{- range .Values.ingress.hostnames }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            backend:
              serviceName: {{ $fullName }}
              servicePort: 80
    {{- end }}