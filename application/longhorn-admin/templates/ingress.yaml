apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "longhorn-admin.fullname" . }}
  labels:
    {{- include "longhorn-admin.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    # traefik.ingress.kubernetes.io/whitelist-source-range: "127.0.0.1/32, 192.168.254.0/24"
    ingress.kubernetes.io/auth-type: basic
    ingress.kubernetes.io/auth-secret: longhorn-basic-auth

spec:
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: longhorn-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
