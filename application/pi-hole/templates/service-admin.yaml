apiVersion: v1
kind: Service
metadata:
  name: {{ include "pi-hole.fullname" . }}-admin
  labels:
    {{- include "pi-hole.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "pi-hole.selectorLabels" . | nindent 4 }}
  ports:
  - port: 80
    targetPort: 80
    name: pihole-admin
  type: ClusterIP