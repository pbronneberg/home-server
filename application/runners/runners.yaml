apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: runner-home-server
spec:
  template:
    spec:
      repository: example-org/home-server
      labels:
        - home-server
        - k3s
      tolerations:
      - effect: NoSchedule
        key: spoke
        operator: Exists
---
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: runner-sample-service
spec:
  template:
    spec:
      repository: example-org/sample-service
      labels:
        - home-server
        - k3s
      tolerations:
      - effect: NoSchedule
        key: spoke
        operator: Exists

---
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: runner-sample-app
spec:
  template:
    spec:
      repository: example-org/sample-app
      labels:
        - home-server
        - k3s
      tolerations:
      - effect: NoSchedule
        key: spoke
        operator: Exists

---
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: runner-autoscaler-dn6us
spec:
  scaleTargetRef:
    name: runner-sample-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: TotalNumberOfQueuedAndInProgressWorkflowRuns
    repositoryNames:
    -  example-org/sample-service

---
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: runner-autoscaler-sec
spec:
  scaleTargetRef:
    name: runner-sample-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: TotalNumberOfQueuedAndInProgressWorkflowRuns
    repositoryNames:
    -  example-org/sample-app

---
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: runner-autoscaler-home-server
spec:
  scaleTargetRef:
    name: runner-home-server
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: TotalNumberOfQueuedAndInProgressWorkflowRuns
    repositoryNames:
    -  example-org/home-server