replicaCount: 1

image:
  repository: homeassistant/home-assistant
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

resourceNames:
  deployment: homeassist-deployment
  service: homeassist
  ingress: homeassist-ingress

selectorLabels:
  app: homeassist

containerName: homeassist

config:
  existingSecret: homeassist-config
  key: configuration.yaml
  defaultMode: 511

volumeNames:
  config: homeassist-config
  storage: homeassist-persistent-storage

timezone: ""

persistence:
  enabled: true
  create: true
  name: homeassist-pv-claim
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  size: 20Gi

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

probes:
  enabled: false

hostNetwork: false
dnsPolicy: ClusterFirst

service:
  type: ClusterIP
  port: 80
  targetPort: 8123

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: "traefik"
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
  hosts:
    - host: homeassistant.home.example
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: homeassist-cert
      hosts:
        - homeassistant.home.example

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
