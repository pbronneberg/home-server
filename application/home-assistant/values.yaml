replicaCount: 1

image:
  repository: homeassistant/home-assistant
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

resourceNames:
  deployment: homeassist-deployment
  service: homeassist
  ingress: homeassist-ingress

selectorLabels:
  app: homeassist

containerName: homeassist

config:
  existingSecret: homeassist-config
  key: configuration.yaml
  defaultMode: 384

volumeNames:
  config: homeassist-config
  storage: homeassist-persistent-storage

timezone: ""

persistence:
  enabled: true
  create: true
  name: homeassist-pv-claim
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  size: 20Gi

serviceAccount:
  create: false
  automountServiceAccountToken: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

probes:
  enabled: false

hostNetwork: false
dnsPolicy: ClusterFirst

service:
  type: ClusterIP
  port: 80
  targetPort: 8123

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,default-github-oauth@kubernetescrd
  hosts:
    - host: homeassistant.home.example
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: homeassist-cert
      hosts:
        - homeassistant.home.example

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

networkPolicy:
  enabled: false
  ingressNamespace: kube-system
  monitoringNamespace: monitoring

nodeSelector: {}

tolerations: []

affinity: {}
