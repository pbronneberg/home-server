apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cluster-status.fullname" . }}-nginx
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index status.json;

      location = /status.json {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store" always;
        try_files /status.json =404;
      }

      location = / {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store" always;
        try_files /status.json =404;
      }
    }
