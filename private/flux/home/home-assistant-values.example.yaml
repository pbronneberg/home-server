apiVersion: v1
kind: Secret
metadata:
  name: homeassist-values
  namespace: homeassistant
type: Opaque
stringData:
  values.yaml: |
    config:
      existingSecret: homeassist-config
      key: configuration.yaml
      defaultMode: 511
    ingress:
      hosts:
      - host: homeassistant.home.example
        paths:
        - path: /
          pathType: ImplementationSpecific
      tls:
      - secretName: home-assistant-tls
        hosts:
        - homeassistant.home.example
    oauth2Proxy:
      enabled: true
      endpointIP: 192.0.2.10
      logout:
        enabled: true
        redirectUrl: https://status.home.example/
    networkPolicy:
      enabled: true
    forwardedHeaders:
      stripForHomeAssistant:
        enabled: true
