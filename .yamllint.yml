extends: default

ignore: |
  .git/
  .helmsman-tmp/
  .idea/
  HomeAssistantConfig.yaml
  HomeAssistentConfig.yaml
  application/**/templates/**/*.yaml
  application/**/templates/**/*.yml
  application/**/templates/*.yaml
  application/**/templates/*.yml
  **/*.secrets.yaml

rules:
  brackets: disable
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines: disable
  hyphens: disable
  indentation: disable
  line-length: disable
  new-line-at-end-of-file: disable
  trailing-spaces: disable
  truthy: disable
