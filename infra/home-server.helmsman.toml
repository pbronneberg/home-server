# version: v3.0.0

context= "home-server-infra"

[metadata]
  org = "personal-cloud.nl"
  maintainer = "Patrick (patrick@bronneberg.org)"
  description = "Basic infrastructure to be installed on home kubernetes cluster"
  notes = "This requires the bare cluster to be provisioned and the kubecontext to be defined as a prerequisite"

[settings]
  kubeContext = "home-server"
  globalMaxHistory= 5

[namespaces]
  [namespaces.mesh]
    protected = false
  [namespaces.cert-manager]
    protected = false
  [namespaces.longhorn-system]
    protected = false
  [namespaces.elasticsearch]
    protected = false
  [namespaces.websites]
    protected = false
    [namespaces.websites.labels]
      env = "production"

[helmRepos]
  jetstack = "https://charts.jetstack.io"
  sealed-secrets = "https://bitnami-labs.github.io/sealed-secrets"
  traefik-mesh = "https://helm.traefik.io/mesh"
  longhorn = "https://charts.longhorn.io"
  elastic = "https://helm.elastic.co"
  
[apps]
  [apps.cert-manager]
    namespace = "cert-manager" 
    enabled = true 
    chart = "jetstack/cert-manager"
    version = "v1.6.1"
    protected = false
    priority= -5
    wait = true
    timeout= 300
    [apps.cert-manager.hooks]
    postInstall="cert-manager/cert-manager.issuers.yaml"
    [apps.cert-manager.set]
    "installCRDs"= "true"
  
  [apps.sealed-secrets]
    namespace = "kube-system" 
    enabled = true 
    chart = "sealed-secrets/sealed-secrets"
    version = "1.16.1"
    protected = false
    priority= -4
    wait = true
    timeout= 300

  [apps.service-mesh]
    namespace = "mesh" 
    enabled = false 
    chart = "traefik-mesh/traefik-mesh"
    version = "4.0.0"
    protected = false
    priority= -4
    wait = true
    timeout= 300

  [apps.longhorn]
    namespace = "longhorn-system" 
    enabled = true 
    chart = "longhorn/longhorn"
    version = "1.2.2"
    protected = false
    priority= -4
    wait = true
    timeout= 300
    [apps.longhorn.hooks]
    postInstall="longhorn/storageclass-longhorn.yaml"
  
  [apps.elasticsearch]
    namespace = "elasticsearch" 
    enabled = true 
    chart = "elastic/elasticsearch"
    version = "7.16.1"
    protected = false
    priority= -3
    valuesFile= "elasticsearch/values.yaml"
    wait = true
    timeout= 300

  [apps.kibana]
    namespace = "elasticsearch" 
    enabled = true 
    chart = "elastic/kibana"
    version = "7.16.1"
    protected = false
    priority= -2
    valuesFile= "kibana/values.yaml"
    wait = true
    timeout= 300