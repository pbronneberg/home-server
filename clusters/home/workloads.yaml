apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workload-bronneberg-org
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-cert-manager-issuers
    - name: infrastructure-traefik-middlewares
  interval: 10m
  path: ./clusters/home/workloads/bronneberg-org
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
---
