apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-namespaces
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/home/infrastructure/namespaces
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-sources
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-namespaces
  interval: 10m
  path: ./clusters/home/infrastructure/sources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-private-secrets
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: infrastructure-namespaces
  interval: 10m
  path: ./private/flux/home
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bootstrap-kairos
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-namespaces
    - name: infrastructure-private-secrets
  interval: 10m
  path: ./clusters/home/bootstrap/kairos/base
  postBuild:
    substituteFrom:
      - kind: Secret
        name: kairos-bootstrap-values
    substitute:
      KAIROS_SERVER_HOSTNAME: kairos-server
      KAIROS_SERVER_INSTALL_DEVICE: /dev/vda
      KAIROS_SERVER_NODE_NAME: kairos-server
      KAIROS_AGENT_HOSTNAME: kairos-agent
      KAIROS_AGENT_INSTALL_DEVICE: /dev/vda
      KAIROS_AGENT_NODE_NAME: kairos-agent
      KAIROS_AGENT_K3S_URL: https://kairos-k3s-api.vms.svc.cluster.local:6443
      KAIROS_CLUSTER_CIDR: 10.244.0.0/16
      KAIROS_SERVICE_CIDR: 10.245.0.0/16
      KAIROS_CLUSTER_DNS: 10.245.0.10
      KAIROS_CLUSTER_DOMAIN: home-server.bronneberg.local
      GITHUB_DEX_SUBJECT: CgtwYnJvbm5lYmVyZxIGZ2l0aHVi
      KAIROS_STAGING_FLUX_BOOTSTRAP: "false"
      KAIROS_STAGING_GIT_BRANCH: main
      KAIROS_STAGING_GIT_URL: https://github.com/pbronneberg/home-server
      KAIROS_STAGING_GIT_RAW_BASE: https://raw.githubusercontent.com/pbronneberg/home-server
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cert-manager
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-sources
  interval: 10m
  path: ./clusters/home/infrastructure/cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
