apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: kairos-bootstrap
  name: kairos-server-user-data
  namespace: kairos-system
stringData:
  userdata: |
    #cloud-config
    hostname: ${KAIROS_SERVER_HOSTNAME}
    install:
      auto: true
      device: ${KAIROS_SERVER_INSTALL_DEVICE}
      poweroff: true
    k3s:
      enabled: true
      env:
        K3S_TOKEN: "${KAIROS_K3S_TOKEN}"
      args:
        - "--node-name=${KAIROS_SERVER_NODE_NAME}"
        - "--secrets-encryption"
        - "--cluster-cidr=${KAIROS_CLUSTER_CIDR}"
        - "--service-cidr=${KAIROS_SERVICE_CIDR}"
        - "--cluster-dns=${KAIROS_CLUSTER_DNS}"
        - "--cluster-domain=${KAIROS_CLUSTER_DOMAIN}"
        - "--write-kubeconfig-mode=0600"
        - "--kube-apiserver-arg=anonymous-auth=false"
        - "--kube-apiserver-arg=profiling=false"
        - "--kube-controller-manager-arg=profiling=false"
        - "--kube-scheduler-arg=profiling=false"
        - "--kubelet-arg=anonymous-auth=false"
        - "--kubelet-arg=read-only-port=0"
        - "--kube-apiserver-arg=oidc-issuer-url=${DEX_ISSUER_URL}"
        - "--kube-apiserver-arg=oidc-client-id=kairos-kubernetes"
        - "--kube-apiserver-arg=oidc-username-claim=sub"
        - "--kube-apiserver-arg=oidc-username-prefix=github:"
        - "--kube-apiserver-arg=oidc-groups-claim=groups"
        - "--kube-apiserver-arg=oidc-groups-prefix=github:"
    users:
      - name: kairos
        lock_passwd: true
        groups:
          - admin
        ssh_authorized_keys:
          - github:${GITHUB_USERNAME}
    stages:
      boot:
        - name: Enable SSH daemon
          commands:
            - |
              set -eu
              systemctl enable sshd.service || systemctl enable ssh.service || true
              systemctl start sshd.service || systemctl start ssh.service || true
              systemctl enable kairos-staging-flux-bootstrap.service || true
      network:
        - name: Refresh operator SSH keys from GitHub
          commands:
            - |
              set -eu

              ssh_dir="/home/kairos/.ssh"
              tmp="/tmp/kairos-github-authorized-keys.$$"

              mkdir -p "$ssh_dir"
              chown kairos:kairos "$ssh_dir"
              chmod 0700 "$ssh_dir"

              if [ ! -s "$ssh_dir/authorized_keys" ]; then
                attempts=0
                while [ "$attempts" -lt 6 ]; do
                  attempts=$((attempts + 1))
                  if timeout 5 wget -qO "$tmp" "https://github.com/${GITHUB_USERNAME}.keys" && [ -s "$tmp" ]; then
                    cp "$tmp" "$ssh_dir/authorized_keys"
                    break
                  fi
                  rm -f "$tmp"
                  sleep 2
                done
              fi

              if [ -s "$ssh_dir/authorized_keys" ]; then
                chown kairos:kairos "$ssh_dir/authorized_keys"
                chmod 0600 "$ssh_dir/authorized_keys"
              else
                echo "warning: no GitHub SSH keys rendered for ${GITHUB_USERNAME}; continuing boot" >&2
              fi

              rm -f "$tmp"
              systemctl enable sshd.service || systemctl enable ssh.service || true
              systemctl start sshd.service || systemctl start ssh.service || true
    write_files:
      - path: /usr/local/sbin/kairos-staging-flux-bootstrap.sh
        permissions: "0700"
        owner: root:root
        content: |
          #!/bin/sh
          set -eu

          if [ "${KAIROS_STAGING_FLUX_BOOTSTRAP}" != "true" ]; then
            exit 0
          fi

          branch="${KAIROS_STAGING_GIT_BRANCH}"
          repo_url="${KAIROS_STAGING_GIT_URL}"
          raw_base="${KAIROS_STAGING_GIT_RAW_BASE}/${KAIROS_STAGING_GIT_BRANCH}"
          work_dir="/run/kairos-staging-flux-bootstrap"
          sync_file="${work_dir}/gotk-sync.yaml"

          mkdir -p "${work_dir}"

          until /usr/bin/k3s kubectl get --raw=/readyz >/dev/null 2>&1; do
            sleep 5
          done

          wget -qO - "${raw_base}/clusters/staging/flux-system/gotk-components.yaml" \
            | /usr/bin/k3s kubectl apply -f -

          wget -qO "${sync_file}" \
            "${raw_base}/clusters/staging/flux-system/gotk-sync.yaml"
          sed -i \
            -e "s|url: .*|url: ${repo_url}|" \
            -e "s|branch: .*|branch: ${branch}|" \
            "${sync_file}"
          /usr/bin/k3s kubectl apply -f "${sync_file}"
      - path: /etc/systemd/system/kairos-staging-flux-bootstrap.service
        permissions: "0644"
        owner: root:root
        content: |
          [Unit]
          Description=Bootstrap Flux for the Kairos PR staging cluster
          Wants=k3s.service network-online.target
          After=k3s.service network-online.target
          ConditionPathExists=/usr/local/sbin/kairos-staging-flux-bootstrap.sh

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/kairos-staging-flux-bootstrap.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
      - path: /var/lib/rancher/k3s/server/manifests/kairos-oidc-admin-binding.yaml
        permissions: "0600"
        owner: root:root
        content: |
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kairos-oidc-admin
          subjects:
            - kind: User
              apiGroup: rbac.authorization.k8s.io
              name: github:${GITHUB_DEX_SUBJECT}
          roleRef:
            kind: ClusterRole
            apiGroup: rbac.authorization.k8s.io
            name: cluster-admin
type: Opaque
