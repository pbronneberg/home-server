apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: kairos-kubevirt-evaluation
    home-server.dev/evaluation: kairos
  name: kairos-server-user-data
  namespace: vms
stringData:
  userdata: |
    #cloud-config
    hostname: kairos-server
    install:
      auto: true
      device: /dev/vda
      reboot: true
    k3s:
      enabled: true
      args:
        - "--node-name=kairos-server"
        - "--token=${KAIROS_K3S_TOKEN}"
        - "--cluster-cidr=198.18.0.0/16"
        - "--service-cidr=198.19.0.0/16"
        - "--cluster-dns=198.19.0.10"
        - "--write-kubeconfig-mode=0600"
    users:
      - name: kairos
        lock_passwd: true
        groups:
          - admin
        ssh_authorized_keys:
          - github:${GITHUB_USERNAME}
    stages:
      network:
        - name: Configure nested K3s OIDC
          commands:
            - |
              set -eu

              mkdir -p /etc/rancher/k3s/config.yaml.d
              cat > /etc/rancher/k3s/config.yaml.d/90-kairos-oidc.yaml <<'EOF'
              kube-apiserver-arg:
                - oidc-issuer-url=${DEX_ISSUER_URL}
                - oidc-client-id=kairos-kubernetes
                - oidc-username-claim=preferred_username
                - oidc-username-prefix=github:
                - oidc-groups-claim=groups
                - oidc-groups-prefix=github:
              EOF
              chmod 0600 /etc/rancher/k3s/config.yaml.d/90-kairos-oidc.yaml

              mkdir -p /var/lib/rancher/k3s/server/manifests
              cat > /var/lib/rancher/k3s/server/manifests/kairos-oidc-admin-binding.yaml <<'EOF'
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: kairos-oidc-pilot-admin
                labels:
                  home-server.dev/evaluation: kairos
              subjects:
                - kind: User
                  apiGroup: rbac.authorization.k8s.io
                  name: github:${GITHUB_USERNAME}
              roleRef:
                kind: ClusterRole
                apiGroup: rbac.authorization.k8s.io
                name: cluster-admin
              EOF
              chmod 0600 /var/lib/rancher/k3s/server/manifests/kairos-oidc-admin-binding.yaml

              if systemctl is-active --quiet k3s.service; then
                systemctl restart k3s.service
              fi
        - name: Fetch operator SSH keys from GitHub
          commands:
            - |
              set -eu

              ssh_dir="/home/kairos/.ssh"
              tmp="/tmp/kairos-github-authorized-keys.$$"

              mkdir -p "$ssh_dir"
              chown kairos:kairos "$ssh_dir"
              chmod 0700 "$ssh_dir"

              attempts=0
              until wget -qO "$tmp" "https://github.com/${GITHUB_USERNAME}.keys" && [ -s "$tmp" ]; do
                attempts=$((attempts + 1))
                rm -f "$tmp"
                if [ "$attempts" -ge 30 ]; then
                  echo "failed to fetch GitHub SSH keys for ${GITHUB_USERNAME}" >&2
                  exit 1
                fi
                sleep 10
              done

              cp "$tmp" "$ssh_dir/authorized_keys"
              chown kairos:kairos "$ssh_dir/authorized_keys"
              chmod 0600 "$ssh_dir/authorized_keys"
              rm -f "$tmp"

              systemctl enable --now sshd.service
type: Opaque
