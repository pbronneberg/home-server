apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: kairos-kubevirt-evaluation
    home-server.dev/evaluation: kairos
  name: kairos-server-user-data
  namespace: vms
stringData:
  userdata: |
    #cloud-config
    hostname: kairos-server
    install:
      auto: true
      device: /dev/vda
      reboot: true
    k3s:
      enabled: true
      args:
        - --node-name=kairos-server
        - --token=${KAIROS_K3S_TOKEN}
        - --cluster-cidr=198.18.0.0/16
        - --service-cidr=198.19.0.0/16
        - --cluster-dns=198.19.0.10
        - --kube-apiserver-arg=oidc-issuer-url=${DEX_ISSUER_URL}
        - --kube-apiserver-arg=oidc-client-id=kairos-kubernetes
        - --kube-apiserver-arg=oidc-username-claim=preferred_username
        - --kube-apiserver-arg=oidc-username-prefix=github:
        - --kube-apiserver-arg=oidc-groups-claim=groups
        - --kube-apiserver-arg=oidc-groups-prefix=github:
        - --write-kubeconfig-mode=0600
    write_files:
      - path: /var/lib/rancher/k3s/server/manifests/kairos-oidc-admin-binding.yaml
        permissions: "0600"
        owner: root:root
        content: |
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kairos-oidc-pilot-admin
            labels:
              home-server.dev/evaluation: kairos
          subjects:
            - kind: User
              apiGroup: rbac.authorization.k8s.io
              name: github:${GITHUB_USERNAME}
          roleRef:
            kind: ClusterRole
            apiGroup: rbac.authorization.k8s.io
            name: cluster-admin
      - path: /usr/local/sbin/kairos-fetch-github-ssh-keys
        permissions: "0700"
        owner: root:root
        content: |
          #!/bin/sh
          set -eu

          ssh_dir="/home/kairos/.ssh"
          tmp="/tmp/kairos-github-authorized-keys.$$"

          mkdir -p "$ssh_dir"
          chown kairos:kairos "$ssh_dir"
          chmod 0700 "$ssh_dir"

          attempts=0
          until wget -qO "$tmp" "https://github.com/${GITHUB_USERNAME}.keys" && [ -s "$tmp" ]; do
            attempts=$((attempts + 1))
            rm -f "$tmp"
            if [ "$attempts" -ge 30 ]; then
              echo "failed to fetch GitHub SSH keys for ${GITHUB_USERNAME}" >&2
              exit 1
            fi
            sleep 10
          done

          cp "$tmp" "$ssh_dir/authorized_keys"
          chown kairos:kairos "$ssh_dir/authorized_keys"
          chmod 0600 "$ssh_dir/authorized_keys"
          rm -f "$tmp"
      - path: /etc/systemd/system/kairos-github-ssh-keys.service
        permissions: "0644"
        owner: root:root
        content: |
          [Unit]
          Description=Fetch GitHub SSH keys for the Kairos operator
          Wants=network-online.target
          After=network-online.target
          StartLimitIntervalSec=0

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/kairos-fetch-github-ssh-keys
          RemainAfterExit=yes
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
    users:
      - name: kairos
        lock_passwd: true
        groups:
          - admin
        ssh_authorized_keys:
          - github:${GITHUB_USERNAME}
    stages:
      network:
        - name: Fetch operator SSH keys from GitHub
          authorized_keys:
            kairos:
              - github:${GITHUB_USERNAME}
        - name: Enable GitHub SSH key refresh service
          systemctl:
            enable:
              - kairos-github-ssh-keys.service
            start:
              - kairos-github-ssh-keys.service
type: Opaque
