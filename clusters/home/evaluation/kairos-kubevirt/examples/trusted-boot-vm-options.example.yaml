apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: kairos-server
  namespace: vms
spec:
  template:
    spec:
      domain:
        firmware:
          bootloader:
            efi:
              secureBoot: true
        features:
          smm:
            enabled: true
        devices:
          # KubeVirt exposes a vTPM (TPM 2.0) device by default for this field.
          # Keep this patch opt-in and pair it with trusted boot media plus
          # persistent TPM state handling in the target virtualization platform.
          tpm: {}
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: kairos-agent
  namespace: vms
spec:
  template:
    spec:
      domain:
        firmware:
          bootloader:
            efi:
              secureBoot: true
        features:
          smm:
            enabled: true
        devices:
          # KubeVirt exposes a vTPM (TPM 2.0) device by default for this field.
          # Keep this patch opt-in and pair it with trusted boot media plus
          # persistent TPM state handling in the target virtualization platform.
          tpm: {}
