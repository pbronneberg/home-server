apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: kairos-kubevirt-evaluation
    home-server.dev/evaluation: kairos
  name: kairos-agent-user-data
  namespace: vms
stringData:
  userdata: |
    #cloud-config
    hostname: kairos-agent
    install:
      auto: true
      device: /dev/vda
      reboot: true
    k3s-agent:
      enabled: true
      args:
        - "--node-name=kairos-agent"
        - "--server=https://kairos-k3s-api.vms.svc.cluster.local:6443"
        - "--token=${KAIROS_K3S_TOKEN}"
    users:
      - name: kairos
        lock_passwd: true
        groups:
          - admin
        ssh_authorized_keys:
          - github:${GITHUB_USERNAME}
    stages:
      network:
        - name: Fetch operator SSH keys from GitHub
          commands:
            - |
              set -eu

              ssh_dir="/home/kairos/.ssh"
              tmp="/tmp/kairos-github-authorized-keys.$$"

              mkdir -p "$ssh_dir"
              chown kairos:kairos "$ssh_dir"
              chmod 0700 "$ssh_dir"

              attempts=0
              until wget -qO "$tmp" "https://github.com/${GITHUB_USERNAME}.keys" && [ -s "$tmp" ]; do
                attempts=$((attempts + 1))
                rm -f "$tmp"
                if [ "$attempts" -ge 30 ]; then
                  echo "failed to fetch GitHub SSH keys for ${GITHUB_USERNAME}" >&2
                  exit 1
                fi
                sleep 10
              done

              cp "$tmp" "$ssh_dir/authorized_keys"
              chown kairos:kairos "$ssh_dir/authorized_keys"
              chmod 0600 "$ssh_dir/authorized_keys"
              rm -f "$tmp"

              systemctl enable --now sshd.service
type: Opaque
