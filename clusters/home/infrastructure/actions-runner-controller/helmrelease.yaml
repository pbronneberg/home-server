apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
spec:
  chart:
    spec:
      chart: actions-runner-controller
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: actions-runner
        namespace: flux-system
      version: 0.15.1
  install:
    remediation:
      retries: 3
  interval: 30m
  maxHistory: 5
  releaseName: actions-runner-controller
  timeout: 5m
  upgrade:
    remediation:
      retries: 3
  values:
    authSecret:
      create: false
      name: controller-manager
  valuesFrom:
    - kind: Secret
      name: actions-runner-controller-values
      optional: true
      valuesKey: values.yaml
