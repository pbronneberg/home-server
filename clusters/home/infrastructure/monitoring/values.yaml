## Create default rules for monitoring the cluster
##
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverError: true
    kubeApiserverSlos: true
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeAlerting: true
    kubePrometheusNodeRecording: true
    kubernetesAbsent: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    prometheus: true
    prometheusOperator: true
    time: true


grafanaOauth2Proxy:
  enabled: false
  serviceName: grafana-oauth2-proxy
  endpointIP: 192.0.2.10
  path: /oauth2
  host: ""
  tlsSecretName: ""
  middlewares:
    - default-redirect-https@kubernetescrd

extraManifests:
  - |
    {{- if .Values.grafanaOauth2Proxy.enabled }}
    {{- $host := .Values.grafanaOauth2Proxy.host | default (index .Values.grafana.ingress.hosts 0) -}}
    {{- $tlsSecret := .Values.grafanaOauth2Proxy.tlsSecretName | default (index (index .Values.grafana.ingress.tls 0) "secretName") -}}
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Values.grafanaOauth2Proxy.serviceName }}
    spec:
      ports:
        - name: http
          port: 80
          protocol: TCP
          targetPort: 80
    ---
    apiVersion: v1
    kind: Endpoints
    metadata:
      name: {{ .Values.grafanaOauth2Proxy.serviceName }}
    subsets:
      - addresses:
          - ip: {{ .Values.grafanaOauth2Proxy.endpointIP }}
        ports:
          - name: http
            port: 80
            protocol: TCP
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: grafana-oauth2
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: {{ join "," .Values.grafanaOauth2Proxy.middlewares }}
        traefik.ingress.kubernetes.io/router.priority: "10000"
    spec:
      ingressClassName: {{ .Values.grafana.ingress.ingressClassName }}
      tls:
        - hosts:
            - {{ $host }}
          secretName: {{ $tlsSecret }}
      rules:
        - host: {{ $host }}
          http:
            paths:
              - path: {{ .Values.grafanaOauth2Proxy.path }}
                pathType: Prefix
                backend:
                  service:
                    name: {{ .Values.grafanaOauth2Proxy.serviceName }}
                    port:
                      number: 80
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: grafana-auth-token-rotate
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        # Keep forward auth for this API, but do not attach the OAuth error
        # middleware. Grafana returns 401 here for stale local session tokens;
        # converting that backend 401 into an OAuth sign-in page causes loops.
        traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,auth-github-oauth-forward-auth@kubernetescrd
        traefik.ingress.kubernetes.io/router.priority: "10001"
    spec:
      ingressClassName: {{ .Values.grafana.ingress.ingressClassName }}
      tls:
        - hosts:
            - {{ $host }}
          secretName: {{ $tlsSecret }}
      rules:
        - host: {{ $host }}
          http:
            paths:
              - path: /api/user/auth-tokens/rotate
                pathType: Exact
                backend:
                  service:
                    name: {{ include "grafana.fullname" (index .Subcharts "grafana") }}
                    port:
                      number: 80
    {{- end }}


##
global:
  rbac:
    create: true
    pspEnabled: true
    pspAnnotations: {}

## Configuration for alertmanager
## ref: https://prometheus.io/docs/alerting/alertmanager/
##
alertmanager:

  ## Deploy alertmanager
  ##
  enabled: true

  ingress:
    enabled: false

    # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
    # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
    ingressClassName: "traefik"

    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,auth-github-oauth@kubernetescrd,default-basic-auth@kubernetescrd

    ## Hosts must be provided if Ingress is enabled.
    ##
    hosts: 
      - alertmanager.home.example

    ## Paths to use for ingress rules - one path should match the alertmanagerSpec.routePrefix
    ##
    paths:
      - /

    pathType: ImplementationSpecific

    ## TLS configuration for Alertmanager Ingress
    ## Secret must be manually created in the namespace
    ##
    tls: 
    - secretName: alertmanager-general-tls
      hosts:
       - alertmanager.home.example

  ## Configuration for Alertmanager secret
  ##
  secret:
    annotations: {}

  ## If true, create a serviceMonitor for alertmanager
  ##
  serviceMonitor:
    ## Scrape interval. If not set, the Prometheus default scrape interval is used.
    ##
    interval: ""
    selfMonitor: true

    ## Size is the expected size of the alertmanager cluster. The controller will eventually make the size of the
    ## running cluster equal to the expected size.
    replicas: 1

    ## Time duration Alertmanager shall retain data for. Default is '120h', and must match the regular expression
    ## [0-9]+(ms|s|m|h) (milliseconds seconds minutes hours).
    ##
    retention: 120h

    ## Storage is the definition of how storage will be used by the Alertmanager instances.
    ## ref: https://github.com/prometheus-operator/prometheus-operator/blob/master/Documentation/user-guides/storage.md
    ##
    storage:
     volumeClaimTemplate:
       spec:
         storageClassName: longhorn
         accessModes: ["ReadWriteOnce"]
         resources:
           requests:
             storage: 50Gi
       selector: {}


    ## The external URL the Alertmanager instances will be available under. This is necessary to generate correct URLs. This is necessary if Alertmanager is not served from root of a DNS name. string  false
    ##
    externalUrl:

    ## The route prefix Alertmanager registers HTTP handlers for. This is useful, if using ExternalURL and a proxy is rewriting HTTP routes of a request, and the actual ExternalURL is still true,
    ## but the server serves requests under a different route prefix. For example for use with kubectl proxy.
    ##
    routePrefix: /

    ## If set to true all actions on the underlying managed objects are not going to be performed, except for delete actions.
    ##
    paused: false


## Using default values from https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
##
grafana:
  enabled: true
  namespaceOverride: ""
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - deepthought
  persistence:
    storageClassName: longhorn

  ## ForceDeployDatasources Create datasource configmap even if grafana deployment has been disabled
  ##
  forceDeployDatasources: false

  ## ForceDeployDashboard Create dashboard configmap even if grafana deployment has been disabled
  ##
  forceDeployDashboards: false

  ## Deploy default dashboards
  ##
  defaultDashboardsEnabled: true

  ## Timezone for the default dashboards
  ## Other options are: browser or a specific timezone, i.e. Europe/Luxembourg
  ##
  defaultDashboardsTimezone: utc

  adminPassword: change-me-use-sops

  # Traefik protects the public Grafana ingress with oauth2-proxy. Grafana then
  # trusts the identity headers copied from oauth2-proxy's /oauth2/auth response,
  # so users do not see Grafana's own login page after the edge OAuth flow.
  grafana.ini:
    auth:
      # Override this in private values when the public status host differs.
      signout_redirect_url: "/oauth2/sign_out?rd=https%3A%2F%2Fstatus.home.example%2F"
      # Ignore stale grafana_session cookies issued before auth.proxy login
      # tokens were disabled.
      login_cookie_name: grafana_auth_proxy_session
    auth.proxy:
      enabled: true
      header_name: X-Auth-Request-Email
      header_property: email
      auto_sign_up: true
      # Keep login tokens disabled when Grafana is behind oauth2-proxy auth
      # headers. Enabling them makes Grafana depend on
      # /api/user/auth-tokens/rotate, which can re-enter the edge auth flow.
      enable_login_token: false
      sync_ttl: 60
      headers: Name:X-Auth-Request-User Email:X-Auth-Request-Email Groups:X-Auth-Request-Groups

  ingress:
    ## If true, Grafana Ingress will be created
    ##
    enabled: false
    ingressClassName: "traefik"

    ## Annotations for Grafana Ingress
    ##
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,auth-github-oauth@kubernetescrd

    ## Hostnames.
    ## Must be provided if Ingress is enable.
    ##
    hosts:
      - grafana.home.example

    ## Path for grafana ingress
    path: /

    ## TLS configuration for grafana Ingress
    ## Secret must be manually created in the namespace
    ##
    tls:
     - secretName: grafana-general-tls
       hosts:
       - grafana.home.example

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

      ## Annotations for Grafana dashboard configmaps
      ##
      annotations: {}
      multicluster:
        global:
          enabled: false
        etcd:
          enabled: false
      provider:
        allowUiUpdates: false
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

      ## URL of prometheus datasource
      ##
      # url: http://prometheus-stack-prometheus:9090/

      # If not defined, will use prometheus.prometheusSpec.scrapeInterval or its default
      # defaultDatasourceScrapeInterval: 15s

      ## Annotations for Grafana datasource configmaps
      ##
      annotations: {}

  ## If true, create a serviceMonitor for grafana
  ##
  serviceMonitor:
    ## Scrape interval. If not set, the Prometheus default scrape interval is used.
    ##
    interval: ""
    selfMonitor: true

## Deploy a Prometheus instance
##
prometheus:

  enabled: true

  # Ingress exposes thanos sidecar outside the cluster
  thanosIngress:
    enabled: false

    # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
    # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
    ingressClassName: "traefik"

    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,auth-github-oauth@kubernetescrd,default-basic-auth@kubernetescrd

    ## Hosts must be provided if Ingress is enabled.
    ##
    hosts:
      - thanos-gateway.home.example

    ## Paths to use for ingress rules
    ##
    paths:
      - /

    ## For Kubernetes >= 1.18 you should specify the pathType (determines how Ingress paths should be matched)
    ## See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#better-path-matching-with-path-types
    pathType: ImplementationSpecific

    ## TLS configuration for Thanos Ingress
    ## Secret must be manually created in the namespace
    ##
    tls:
     - secretName: thanos-gateway-tls
       hosts:
       - thanos-gateway.home.example
    



  ingress:
    enabled: false

    # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
    # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
    ingressClassName: "traefik"

    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,auth-github-oauth@kubernetescrd,default-basic-auth@kubernetescrd

    labels: {}

    ## Hostnames.
    ## Must be provided if Ingress is enabled.
    ##
    hosts:
      - prometheus.home.example

    ## Paths to use for ingress rules - one path should match the prometheusSpec.routePrefix
    ##
    paths:
     - /

    ## For Kubernetes >= 1.18 you should specify the pathType (determines how Ingress paths should be matched)
    ## See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#better-path-matching-with-path-types
    pathType: ImplementationSpecific

    ## TLS configuration for Prometheus Ingress
    ## Secret must be manually created in the namespace
    ##
    tls:
      - secretName: prometheus-general-tls
        hosts:
          - prometheus.home.example
