apiVersion: batch/v1
kind: CronJob
metadata:
  name: homelab-autoscaler-longhorn-safe-to-evict
  namespace: homelab-autoscaler-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: homelab-autoscaler-longhorn-safe-to-evict
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: deepthought
          containers:
            - name: annotate
              image: alpine/k8s:1.32.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
              args:
                - -ceu
                - |
                  annotation="cluster-autoscaler.kubernetes.io/safe-to-evict"

                  kubectl get nodes -l home-server.dev/autoscaled=true \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
                  while IFS= read -r node; do
                    [ -n "${node}" ] || continue

                    has_replicas="$(
                      kubectl get replicas.longhorn.io -n longhorn-system \
                        -o jsonpath='{range .items[*]}{.spec.nodeID}{"\n"}{end}' |
                      grep -Fx "${node}" || true
                    )"
                    has_attached_volumes="$(
                      kubectl get volumes.longhorn.io -n longhorn-system \
                        -o jsonpath='{range .items[*]}{.status.currentNodeID}{"\n"}{end}' |
                      grep -Fx "${node}" || true
                    )"

                    pods="$(
                      kubectl get pods -n longhorn-system \
                        -l "longhorn.io/component=instance-manager,longhorn.io/node=${node}" \
                        -o name
                    )"
                    [ -n "${pods}" ] || continue

                    if [ -z "${has_replicas}" ] && [ -z "${has_attached_volumes}" ]; then
                      echo "marking Longhorn instance-manager pods safe to evict on idle autoscaled node ${node}"
                      printf '%s\n' "${pods}" |
                      while IFS= read -r pod; do
                        [ -n "${pod}" ] || continue
                        kubectl annotate -n longhorn-system --overwrite "${pod}" "${annotation}=true"
                      done
                    else
                      echo "removing safe-to-evict from Longhorn instance-manager pods on active storage node ${node}"
                      printf '%s\n' "${pods}" |
                      while IFS= read -r pod; do
                        [ -n "${pod}" ] || continue
                        kubectl annotate -n longhorn-system --overwrite "${pod}" "${annotation}-" || true
                      done
                    fi
                  done
