apiVersion: infra.homecluster.dev/v1alpha1
kind: Node
metadata:
  name: milliard
  namespace: homelab-autoscaler-system
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  labels:
    group: wol-compute-workers
    home-server.dev/node-role: autoscaled-worker
spec:
  kubernetesNodeName: milliard
  powerState: "on"
  pricing:
    hourlyRate: "0"
    podRate: "0"
  taintsToRemove:
    - key: node.kubernetes.io/unschedulable
      effect: NoSchedule
  startupPodSpec:
    image: alpine/k8s:1.32.0
    command:
      - /bin/sh
    args:
      - -ceu
      - |
        node="milliard"
        relay_url="http://homelab-autoscaler-wol-relay:18080/wake/${node}"
        wget -q -O - -T 30 "${relay_url}"
        kubectl wait --for=condition=Ready "node/${node}" --timeout=15m
        kubectl uncordon "${node}"
    serviceAccount: homelab-autoscaler-shutdown
    ttlSecondsAfterFinished: 600
  shutdownPodSpec:
    image: alpine/k8s:1.32.0
    command:
      - /bin/sh
    args:
      - -ceu
      - |
        node="milliard"
        if [ "${node}" = "deepthought" ]; then
          echo "refusing to shut down protected node ${node}" >&2
          exit 1
        fi
        autoscaled="$(kubectl get node "${node}" -o jsonpath='{.metadata.labels.home-server\.dev/autoscaled}')"
        if [ "${autoscaled}" != "true" ]; then
          echo "refusing to shut down ${node}: node is not labeled autoscaled" >&2
          exit 1
        fi
        if kubectl get node "${node}" -o jsonpath='{.metadata.labels.home-server\.dev/storage}' | grep -qx permanent; then
          echo "refusing to shut down permanent storage node ${node}" >&2
          exit 1
        fi
        if kubectl get replicas.longhorn.io -n longhorn-system -o jsonpath='{range .items[*]}{.spec.nodeID}{"\n"}{end}' | grep -qx "${node}"; then
          echo "refusing to shut down ${node}: Longhorn replicas are present" >&2
          exit 1
        fi
        if kubectl get volumes.longhorn.io -n longhorn-system -o jsonpath='{range .items[*]}{.status.currentNodeID}{"\n"}{end}' | grep -qx "${node}"; then
          echo "refusing to shut down ${node}: Longhorn volume is attached" >&2
          exit 1
        fi
        if ! command -v ssh >/dev/null 2>&1; then
          apk add --no-cache openssh-client
        fi
        kubectl drain "${node}" --ignore-daemonsets --delete-emptydir-data --timeout=10m
        set -a
        . /etc/homelab-autoscaler/nodes.env
        set +a
        ssh_host="$(kubectl get node "${node}" -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}')"
        if [ -z "${ssh_host}" ]; then
          ssh_host="${MILLIARD_SSH_HOST}"
        fi
        mkdir -p /root/.ssh
        cp /etc/homelab-autoscaler/ssh_private_key /root/.ssh/id_ed25519
        chmod 0600 /root/.ssh/id_ed25519
        set -- ${MILLIARD_SSH_HOST_KEY}
        printf '%s %s %s\n' "${ssh_host}" "$2" "$3" > /root/.ssh/known_hosts
        ssh -i /root/.ssh/id_ed25519 -o BatchMode=yes -o UserKnownHostsFile=/root/.ssh/known_hosts "${MILLIARD_SSH_USER}@${ssh_host}" "sudo /sbin/poweroff"
    volumes:
      - name: node-power-config
        mountPath: /etc/homelab-autoscaler
        secretName: homelab-autoscaler-nodes
    serviceAccount: homelab-autoscaler-shutdown
    ttlSecondsAfterFinished: 600
