apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-custom-templates
data:
  robots.txt: |
    User-agent: *
    Disallow: /
  error.html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{.StatusCode}} {{.Title}}</title>
        <style>
          :root {
            --ink: #111c26;
            --muted: #71808b;
            --line: #d9e1e5;
            --green: #267b2b;
            --green-dark: #17651f;
            --shadow: 0 22px 60px rgba(17, 28, 38, 0.12);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }
          * { box-sizing: border-box; }
          body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: var(--sans);
            background: radial-gradient(circle at 50% 24%, rgba(38, 123, 43, 0.08), transparent 18rem), #fbfcfb;
            display: grid;
            place-items: center;
            padding: 28px;
          }
          .error-card {
            width: min(100%, 640px);
            padding: 42px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            text-align: center;
          }
          .code {
            margin: 0;
            color: var(--green);
            font-family: var(--mono);
            font-size: clamp(4rem, 18vw, 9rem);
            line-height: 0.9;
          }
          h1 {
            margin: 20px 0 12px;
            font-size: clamp(1.7rem, 5vw, 2.4rem);
          }
          .message {
            margin: 0 auto 26px;
            color: var(--muted);
            font-family: var(--mono);
            line-height: 1.55;
          }
          .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 30px;
          }
          button {
            width: 100%;
            min-height: 48px;
            border-radius: 8px;
            border: 1px solid var(--green);
            background: #fff;
            color: var(--green-dark);
            font: 600 1rem var(--sans);
            cursor: pointer;
          }
          .primary {
            background: linear-gradient(135deg, #309238, #1f7425);
            color: #fff;
            border-color: transparent;
          }
          .meta {
            margin-top: 24px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.82rem;
          }
          @media (max-width: 560px) {
            .error-card { padding: 30px 22px; }
            .actions { grid-template-columns: 1fr; }
          }
        </style>
      </head>
      <body>
        <main class="error-card">
          <p class="code">{{.StatusCode}}</p>
          <h1>{{.Title}}</h1>
          {{ if .Message }}<p class="message">{{.Message}}</p>{{ end }}
          {{ if .Redirect }}
          <div class="actions">
            <form method="GET" action="{{.Redirect}}"><button type="submit">Go back</button></form>
            <form method="GET" action="{{.ProxyPrefix}}/sign_in">
              <input type="hidden" name="rd" value="{{.Redirect}}">
              <button type="submit" class="primary">Sign in</button>
            </form>
          </div>
          {{ end }}
          {{ if .RequestID }}<div class="meta">Request ID: {{.RequestID}}</div>{{ end }}
        </main>
      </body>
    </html>
  sign_in.html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>bronneberg.org identity gateway</title>
        <style>
          :root {
            color-scheme: light;
            --ink: #101a20;
            --ink-soft: #273842;
            --green: #287a38;
            --green-dark: #0b4f25;
            --green-mid: #3f8d4e;
            --green-pale: #eef8ed;
            --paper: #f7f8f5;
            --wash: #f7f8f5;
            --line: #cfe2ce;
            --line-strong: #8fbd94;
            --shadow: 0 26px 70px rgba(15, 42, 22, 0.12);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }

          * { box-sizing: border-box; }

          html,
          body { min-height: 100%; }

          body {
            min-height: 100dvh;
            margin: 0;
            overflow: hidden;
            color: var(--ink);
            font-family: var(--sans);
            background:
              radial-gradient(circle at 34% 24%, rgba(40, 122, 56, 0.075), transparent 21rem),
              radial-gradient(circle at 76% 72%, rgba(40, 122, 56, 0.055), transparent 24rem),
              var(--wash);
          }

          .page {
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: clamp(10px, 2.8vh, 38px);
          }

          .frame {
            position: relative;
            width: min(calc(100vw - clamp(20px, 5.6vw, 76px)), 1460px);
            height: min(calc(100dvh - clamp(20px, 5.6vh, 76px)), 920px);
            max-height: calc(100dvh - clamp(20px, 5.6vh, 76px));
            border: 3px solid var(--line-strong);
            border-radius: clamp(22px, 2vw, 30px);
            background: rgba(247, 248, 245, 0.94);
            box-shadow: var(--shadow);
            padding: clamp(24px, 3vw, 44px);
            display: grid;
            grid-template-rows: minmax(0, 1fr) clamp(84px, 11vh, 112px);
            gap: clamp(12px, 1.7vh, 22px);
            overflow: hidden;
          }

          .stage {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1.42fr) minmax(380px, 0.72fr);
            align-items: center;
            gap: clamp(28px, 4vw, 62px);
            overflow: hidden;
          }

          .scene {
            position: relative;
            min-width: 0;
            width: 100%;
            min-height: 0;
            align-self: stretch;
            display: grid;
            overflow: hidden;
            place-items: center;
          }

          .scene-inner {
            position: relative;
            height: calc(100% - clamp(24px, 3.4vh, 42px));
            width: auto;
            max-width: 100%;
            aspect-ratio: 872 / 705;
          }

          .scene-art {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center bottom;
            display: block;
          }

          .scene-status {
            position: absolute;
            left: 3.7%;
            top: 40.3%;
            max-width: 38%;
            color: var(--green-mid);
            background: rgba(247, 248, 245, 0.88);
            border-radius: 3px;
            padding: 0.05em 0.35em 0.05em 0.08em;
            font: 700 clamp(0.7rem, 0.98vw, 0.98rem)/1.2 var(--mono);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 8px var(--wash);
          }

          .auth-panel {
            justify-self: center;
            width: min(100%, 486px);
            max-height: 100%;
            padding: clamp(24px, 2.5vw, 36px) clamp(28px, 3vw, 38px);
            border: 2px solid var(--line);
            border-radius: 18px;
            background: rgba(247, 248, 245, 0.86);
            box-shadow: 0 22px 54px rgba(15, 42, 22, 0.08);
            text-align: center;
          }

          .brand-mark {
            mix-blend-mode: normal;
            width: clamp(104px, 8.8vw, 150px);
            height: auto;
            display: block;
            margin: 0 auto clamp(22px, 3vh, 34px);
          }

          .brand-name {
            margin: 0;
            color: var(--ink);
            font-family: var(--mono);
            font-size: clamp(1.9rem, 2.45vw, 2.55rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
          }

          .tagline {
            margin: 12px 0 0;
            color: var(--green);
            font-family: var(--mono);
            font-size: clamp(0.9rem, 1.24vw, 1.12rem);
            font-weight: 700;
          }

          .divider {
            height: 1px;
            margin: clamp(22px, 3vh, 34px) 0 clamp(18px, 2.4vh, 26px);
            background: var(--line);
          }

          .panel-title {
            margin: 0 0 22px;
            color: var(--ink);
            font-size: clamp(1.18rem, 1.6vw, 1.42rem);
            font-weight: 800;
          }

          .notice,
          .alert {
            margin: 0 0 16px;
            padding: 11px 12px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 0.88rem;
            text-align: left;
          }

          .notice {
            color: var(--green-dark);
            background: var(--green-pale);
            border: 1px solid rgba(40, 122, 56, 0.2);
          }

          .alert {
            color: #8d1f1f;
            background: #fff0f0;
            border: 1px solid #f0c5c5;
          }

          .closebtn {
            float: right;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
          }

          form { margin: 0; }

          .auth-button {
            width: 100%;
            min-height: 66px;
            border: 2px solid #88b98f;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            color: #fff;
            background:
              radial-gradient(circle at 22% 0%, rgba(255, 255, 255, 0.12), transparent 9rem),
              linear-gradient(135deg, #111c22, #061014 72%);
            box-shadow: 0 14px 28px rgba(8, 25, 15, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            font-size: clamp(1.08rem, 1.55vw, 1.28rem);
            font-weight: 800;
            cursor: pointer;
          }

          .auth-button svg {
            width: 35px;
            height: 35px;
            flex: 0 0 auto;
          }

          .auth-button:hover,
          .auth-button:focus-visible {
            outline: 4px solid rgba(40, 122, 56, 0.2);
            outline-offset: 3px;
            border-color: var(--green);
          }

          .basic-login {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            display: grid;
            gap: 12px;
            text-align: left;
          }

          .basic-login label {
            display: grid;
            gap: 7px;
            color: var(--green-dark);
            font-family: var(--mono);
            font-size: 0.86rem;
          }

          .basic-login input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            padding: 0 12px;
            color: var(--ink);
            font: inherit;
            background: #fff;
          }

          .basic-login button {
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            color: #fff;
            background: var(--green);
            font: inherit;
            cursor: pointer;
          }

          .assurance {
            margin-top: clamp(18px, 2.4vh, 26px);
            padding: 15px 18px;
            border: 1px solid var(--line);
            border-radius: 12px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 16px;
            align-items: center;
            background: rgba(246, 251, 246, 0.78);
            color: var(--ink);
            text-align: left;
            line-height: 1.45;
          }

          .assurance svg {
            width: 38px;
            height: 38px;
            color: var(--green);
          }

          .status-chip {
            display: block;
            margin-top: 4px;
            color: var(--green);
            font: 700 0.82rem/1.35 var(--mono);
          }

          .traits {
            border-top: 1px solid var(--line);
            min-height: 0;
            padding-top: 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0;
          }

          .trait {
            min-width: 0;
            padding: 0 clamp(16px, 2.4vw, 34px);
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 16px;
            align-items: center;
          }

          .trait + .trait { border-left: 1px solid var(--line); }

          .trait svg {
            width: clamp(42px, 4vw, 58px);
            height: clamp(42px, 4vw, 58px);
            color: var(--green);
          }

          .trait strong,
          .trait span { display: block; }

          .trait strong {
            font-size: clamp(0.95rem, 1.15vw, 1.08rem);
            font-weight: 500;
          }

          .trait span {
            margin-top: 8px;
            font-size: clamp(0.86rem, 1.05vw, 1rem);
          }

          @media (max-width: 1180px) {
            .frame {
              grid-template-rows: minmax(0, 1fr) 96px;
              gap: 12px;
              padding: clamp(20px, 2.5vw, 34px);
            }
            .stage {
              grid-template-columns: minmax(0, 1.18fr) minmax(330px, 0.82fr);
              gap: 24px;
            }
            .scene-inner { height: calc(100% - 40px); }
            .auth-panel {
              width: min(100%, 420px);
              padding: 24px 28px;
            }
            .brand-mark { width: 94px; margin-bottom: 14px; }
            .brand-name { font-size: clamp(1.85rem, 3vw, 2.2rem); }
            .tagline { margin-top: 9px; font-size: 0.92rem; }
            .divider { margin: 18px 0 16px; }
            .panel-title { margin-bottom: 16px; font-size: 1.18rem; }
            .auth-button { min-height: 58px; font-size: 1.04rem; }
            .auth-button svg { width: 30px; height: 30px; }
            .assurance { display: none; }
            .trait { gap: 12px; padding-inline: 14px; }
            .trait svg { width: 38px; height: 38px; }
            .trait strong { font-size: 0.92rem; }
            .trait span { margin-top: 4px; font-size: 0.84rem; }
          }

          @media (max-width: 820px) {
            body { overflow: hidden; }
            .page { padding: 0; place-items: stretch; }
            .frame {
              width: 100vw;
              height: 100dvh;
              max-height: none;
              border: 0;
              border-radius: 0;
              padding: clamp(14px, 4vw, 22px);
              grid-template-rows: minmax(0, 1fr) auto;
              gap: 14px;
            }

            .stage {
              min-height: 0;
              display: grid;
              grid-template-columns: 1fr;
              align-items: center;
            }

            .scene { display: none; }

            .auth-panel {
              width: min(100%, 460px);
              max-height: 100%;
              justify-self: center;
              padding: clamp(22px, 6vw, 30px) clamp(18px, 5vw, 28px);
              border-radius: 18px;
              overflow: hidden;
            }

            .brand-mark { width: clamp(86px, 24vw, 118px); margin-bottom: 16px; }
            .brand-name { font-size: clamp(1.78rem, 8.2vw, 2.5rem); }
            .tagline { margin-top: 10px; font-size: clamp(0.78rem, 3.5vw, 0.98rem); }
            .divider { margin: 20px 0 17px; }
            .panel-title { margin-bottom: 18px; font-size: clamp(1.1rem, 4.5vw, 1.32rem); }
            .auth-button { min-height: 62px; border-radius: 12px; font-size: clamp(1rem, 4vw, 1.14rem); }
            .auth-button svg { width: 30px; height: 30px; }
            .assurance { display: grid; margin-top: 18px; padding: 14px; font-size: 0.88rem; }

            .traits {
              padding-top: 14px;
              grid-template-columns: repeat(2, minmax(0, 1fr));
              gap: 12px 0;
            }

            .trait {
              grid-template-columns: auto minmax(0, 1fr);
              gap: 10px;
              padding: 0 10px;
            }

            .trait:nth-child(3) { border-left: 0; }
            .trait svg { width: 34px; height: 34px; }
            .trait strong { font-size: 0.84rem; }
            .trait span { margin-top: 4px; font-size: 0.78rem; }
          }

          @media (max-width: 460px) {
            .frame { padding: 12px; }
            .auth-panel { padding: 20px 14px; }
            .assurance { grid-template-columns: auto 1fr; gap: 12px; }
            .assurance svg { width: 32px; height: 32px; }
            .traits { grid-template-columns: 1fr 1fr; }
            .trait { grid-template-columns: 1fr; text-align: center; gap: 6px; }
            .trait svg { margin: 0 auto; }
          }

          @media (max-height: 760px) and (min-width: 821px) {
            .frame { padding: 20px 30px; gap: 10px; grid-template-rows: minmax(0, 1fr) 88px; }
            .auth-panel { padding-top: 22px; padding-bottom: 22px; }
            .brand-mark { width: 104px; margin-bottom: 16px; }
            .brand-name { font-size: 2.25rem; }
            .tagline { margin-top: 9px; font-size: 0.96rem; }
            .divider { margin: 18px 0 16px; }
            .panel-title { margin-bottom: 16px; }
            .auth-button { min-height: 60px; }
            .assurance { display: none; }
            .scene-inner { height: calc(100% - 52px); }
            .traits { padding-top: 0; }
            .trait svg { width: 38px; height: 38px; }
            .trait span { margin-top: 4px; }
          }

          @media (max-height: 720px) and (max-width: 820px) {
            .assurance,
            .traits { display: none; }
            .auth-panel { align-self: center; }
          }
        </style>
      </head>
      <body>
        <main class="page">
          <section class="frame" aria-label="bronneberg.org identity gateway">
            <div class="stage">
              <section class="scene" aria-label="Access checks">
                <div class="scene-inner" id="status-probe" data-status-url="https://status.bronneberg.org/status.json">
                  <img class="scene-art" src="data:image/webp;base64," alt="Homelab operator approving an OAuth2 access request">
                  <span class="scene-status" id="cluster-state">! checking</span>
                </div>
              </section>

              <section class="auth-panel" aria-label="Authentication">
                <img class="brand-mark" src="data:image/webp;base64," alt="bronneberg.org homelab identity mark">
                <h1 class="brand-name">bronneberg.org</h1>
                <p class="tagline">self-hosted identity platform</p>
                <div class="divider"></div>
                <p class="panel-title">Sign in to continue</p>

                {{ if .SignInMessage }}
                <p class="notice">{{.SignInMessage}}</p>
                {{ end}}

                {{ if eq .StatusCode 400 401 }}
                <div class="alert">
                  <button class="closebtn" type="button" onclick="this.parentElement.style.display='none';" aria-label="Dismiss">&times;</button>
                  {{ if eq .StatusCode 400 }}
                  {{.StatusCode}}: Username cannot be empty
                  {{ else }}
                  {{.StatusCode}}: Invalid Username or Password
                  {{ end }}
                </div>
                {{ end }}

                <form method="GET" action="{{.ProxyPrefix}}/start">
                  <input type="hidden" name="rd" value="{{.Redirect}}">
                  <button type="submit" class="auth-button">
                    <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                      <path d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 .1.9 2.1 2.8 1.5.1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.3v3.5c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/>
                    </svg>
                    <span>Continue with {{.ProviderName}}</span>
                  </button>
                </form>

                {{ if .CustomLogin }}
                <form method="POST" action="{{.ProxyPrefix}}/sign_in" class="basic-login">
                  <input type="hidden" name="rd" value="{{.Redirect}}">
                  <label for="username">Username<input type="text" name="username" id="username" autocomplete="username"></label>
                  <label for="password">Password<input type="password" name="password" id="password" autocomplete="current-password"></label>
                  <button type="submit">Sign in</button>
                </form>
                {{ end }}

                <div class="assurance">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 20 6v6.2c0 5-3.4 8.2-8 9.3-4.6-1.1-8-4.3-8-9.3V6Z"/><path d="m9 12 2 2 4-5"/></svg>
                  <span>Secure access to self-hosted services.<span class="status-chip" id="panel-cluster-state">Cluster check pending</span></span>
                </div>
              </section>
            </div>

            <section class="traits" aria-label="Platform traits">
              <div class="trait">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 20 6v6.2c0 5-3.4 8.2-8 9.3-4.6-1.1-8-4.3-8-9.3V6Z"/><rect x="9" y="11" width="6" height="5.5" rx="1"/><path d="M10 11V9.6a2 2 0 0 1 4 0V11"/></svg>
                <div><strong>Secure by default</strong><span>Zero trust access</span></div>
              </div>
              <div class="trait">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="7.5"/><circle cx="12" cy="12" r="2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/></svg>
                <div><strong>Kubernetes native</strong><span>Self-hosted at home</span></div>
              </div>
              <div class="trait">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6 13 12 6 18"/><path d="M14 18h4"/></svg>
                <div><strong>Open source</strong><span>Transparent by design</span></div>
              </div>
              <div class="trait">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="5" rx="1.5"/><rect x="4" y="10" width="16" height="5" rx="1.5"/><rect x="4" y="16" width="16" height="4" rx="1.5"/><path d="M8 6.5h5M8 12.5h5M8 18h5M17 6.5h.1M17 12.5h.1M17 18h.1"/></svg>
                <div><strong>Homelab built</strong><span>With care and coffee</span></div>
              </div>
            </section>
          </section>
        </main>

        <script>
          if (window.location.hash) {
            (function() {
              var inputs = document.getElementsByName('rd');
              for (var i = 0; i < inputs.length; i++) {
                var idx = inputs[i].value.indexOf('#');
                if (idx >= 0) {
                  inputs[i].value = inputs[i].value.substr(0, idx);
                }
                inputs[i].value += window.location.hash;
              }
            })();
          }

          (function() {
            var probe = document.getElementById('status-probe');
            var sceneCluster = document.getElementById('cluster-state');
            var panelCluster = document.getElementById('panel-cluster-state');
            if (!probe || !window.fetch) return;

            function textFromStatus(status) {
              var summary = status && status.summary;
              if (!summary && status && Array.isArray(status.signals)) {
                summary = status.signals.map(function(signal) { return signal.label; }).join(' / ');
              }
              return summary || 'status unavailable';
            }

            function sceneText(summary, state) {
              if (state === 'green' && /edge/i.test(summary) && /gitops/i.test(summary)) return 'Edge green / GitOps current';
              if (state === 'green') return summary.length > 28 ? 'healthy' : summary;
              if (state === 'red') return summary.length > 24 ? 'attention needed' : summary;
              return summary.length > 24 ? 'status unknown' : summary;
            }

            function setCluster(summary, state) {
              var scenePrefix = state === 'red' ? '! ' : '! ';
              var panelPrefix = state === 'red' ? 'Cluster: attention needed' : 'Cluster: ';
              if (sceneCluster) sceneCluster.textContent = scenePrefix + sceneText(summary, state);
              if (panelCluster) panelCluster.textContent = state === 'red' ? 'Cluster: attention needed' : panelPrefix + summary;
            }

            fetch(probe.getAttribute('data-status-url'), { cache: 'no-store' })
              .then(function(response) {
                if (!response.ok) throw new Error('status fetch failed');
                return response.json();
              })
              .then(function(status) {
                setCluster(textFromStatus(status), status.state || 'unknown');
              })
              .catch(function() {
                setCluster('status unavailable', 'yellow');
              });
          })();
        </script>
      </body>
    </html>
