apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-custom-templates
data:
  robots.txt: |
    User-agent: *
    Disallow: /
  error.html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{.StatusCode}} {{.Title}}</title>
        <style>
          :root {
            --ink: #111c26;
            --muted: #71808b;
            --line: #d9e1e5;
            --green: #267b2b;
            --green-dark: #17651f;
            --shadow: 0 22px 60px rgba(17, 28, 38, 0.12);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }
          * { box-sizing: border-box; }
          body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: var(--sans);
            background: radial-gradient(circle at 50% 24%, rgba(38, 123, 43, 0.08), transparent 18rem), #fbfcfb;
            display: grid;
            place-items: center;
            padding: 28px;
          }
          .error-card {
            width: min(100%, 640px);
            padding: 42px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            text-align: center;
          }
          .code {
            margin: 0;
            color: var(--green);
            font-family: var(--mono);
            font-size: clamp(4rem, 18vw, 9rem);
            line-height: 0.9;
          }
          h1 {
            margin: 20px 0 12px;
            font-size: clamp(1.7rem, 5vw, 2.4rem);
          }
          .message {
            margin: 0 auto 26px;
            color: var(--muted);
            font-family: var(--mono);
            line-height: 1.55;
          }
          .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 30px;
          }
          button {
            width: 100%;
            min-height: 48px;
            border-radius: 8px;
            border: 1px solid var(--green);
            background: #fff;
            color: var(--green-dark);
            font: 600 1rem var(--sans);
            cursor: pointer;
          }
          .primary {
            background: linear-gradient(135deg, #309238, #1f7425);
            color: #fff;
            border-color: transparent;
          }
          .meta {
            margin-top: 24px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.82rem;
          }
          @media (max-width: 560px) {
            .error-card { padding: 30px 22px; }
            .actions { grid-template-columns: 1fr; }
          }
        </style>
      </head>
      <body>
        <main class="error-card">
          <p class="code">{{.StatusCode}}</p>
          <h1>{{.Title}}</h1>
          {{ if .Message }}<p class="message">{{.Message}}</p>{{ end }}
          {{ if .Redirect }}
          <div class="actions">
            <form method="GET" action="{{.Redirect}}"><button type="submit">Go back</button></form>
            <form method="GET" action="{{.ProxyPrefix}}/sign_in">
              <input type="hidden" name="rd" value="{{.Redirect}}">
              <button type="submit" class="primary">Sign in</button>
            </form>
          </div>
          {{ end }}
          {{ if .RequestID }}<div class="meta">Request ID: {{.RequestID}}</div>{{ end }}
        </main>
      </body>
    </html>
  sign_in.html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>bronneberg.org sign in</title>
        <style>
          :root {
            color-scheme: light;
            --ink: #111c26;
            --muted: #71808b;
            --line: #d9e1e5;
            --line-strong: #c6d0d6;
            --green: #267b2b;
            --green-dark: #17651f;
            --green-soft: #e8f5ea;
            --shadow: 0 14px 36px rgba(17, 28, 38, 0.10);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }

          * { box-sizing: border-box; }

          html,
          body { min-height: 100%; }

          body {
            min-height: 100dvh;
            margin: 0;
            color: var(--ink);
            font-family: var(--sans);
            background:
              radial-gradient(circle at 50% 20%, rgba(38, 123, 43, 0.08), transparent 14rem),
              linear-gradient(90deg, rgba(232, 245, 234, 0.55), transparent 16%, transparent 84%, rgba(232, 245, 234, 0.55)),
              #fbfcfb;
            overflow-x: hidden;
          }

          body::before,
          body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.45;
          }

          body::before {
            background:
              radial-gradient(circle, rgba(38, 123, 43, 0.22) 0 1.4px, transparent 2px) 18px 16px / 28px 28px no-repeat,
              radial-gradient(circle, rgba(38, 123, 43, 0.18) 0 1.3px, transparent 2px) calc(100% - 220px) 26px / 34px 34px no-repeat,
              radial-gradient(circle, rgba(38, 123, 43, 0.13) 0 1px, transparent 2px) calc(100% - 140px) calc(100% - 190px) / 20px 20px no-repeat;
          }

          body::after {
            background:
              linear-gradient(90deg, rgba(38, 123, 43, 0.18) 0 82px, transparent 82px) left 20% / 170px 1px no-repeat,
              linear-gradient(90deg, rgba(38, 123, 43, 0.14) 0 130px, transparent 130px) left 31% / 230px 1px no-repeat,
              linear-gradient(90deg, transparent 0 58px, rgba(38, 123, 43, 0.16) 58px 176px, transparent 176px) right 24% / 240px 1px no-repeat,
              linear-gradient(90deg, transparent 0 44px, rgba(38, 123, 43, 0.14) 44px 190px, transparent 190px) right 36% / 250px 1px no-repeat;
          }

          .page {
            position: relative;
            z-index: 1;
            width: min(100%, 900px);
            min-height: 100dvh;
            margin: 0 auto;
            padding: clamp(18px, 4vh, 34px) 22px 18px;
            display: grid;
            grid-template-rows: 1fr auto;
            gap: clamp(14px, 3vh, 28px);
          }

          .content {
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
          }

          .hero { text-align: center; }

          .brand-mark {
            width: clamp(104px, 17vh, 156px);
            max-width: 42vw;
            height: auto;
            display: block;
            margin: 0 auto clamp(10px, 2vh, 18px);
            filter: drop-shadow(0 10px 16px rgba(17, 28, 38, 0.12));
          }

          .brand-name {
            margin: 0;
            font-family: var(--mono);
            font-size: clamp(2.35rem, 5.4vw, 3.65rem);
            font-weight: 500;
            line-height: 0.95;
            letter-spacing: 0;
          }

          .brand-name .domain { color: var(--green); }

          .tagline {
            margin: clamp(8px, 1.8vh, 14px) 0 0;
            color: var(--green);
            font-family: var(--mono);
            font-size: clamp(1rem, 2.2vw, 1.35rem);
          }

          .prompt {
            margin: clamp(16px, 3vh, 26px) 0 clamp(18px, 3vh, 28px);
            font-family: var(--mono);
            font-size: clamp(0.95rem, 2.1vw, 1.18rem);
            color: var(--ink);
          }

          .prompt span {
            color: var(--green);
            font-weight: 700;
            margin-right: 12px;
          }

          .auth-card {
            width: min(100%, 640px);
            padding: clamp(20px, 3.6vh, 30px) clamp(20px, 5vw, 42px) clamp(18px, 3.4vh, 28px);
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
          }

          .notice,
          .alert {
            margin: 0 0 16px;
            padding: 10px 12px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 0.9rem;
          }

          .notice {
            color: var(--green-dark);
            background: var(--green-soft);
            border: 1px solid rgba(38, 123, 43, 0.18);
          }

          .alert {
            color: #8d1f1f;
            background: #fff0f0;
            border: 1px solid #f0c5c5;
          }

          .closebtn {
            float: right;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
          }

          form { margin: 0; }

          .auth-button {
            width: 100%;
            min-height: clamp(50px, 7vh, 60px);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border: 1px solid transparent;
            color: #fff;
            background: linear-gradient(135deg, #309238, #1f7425);
            box-shadow: 0 12px 22px rgba(38, 123, 43, 0.22);
            font-size: clamp(1.08rem, 2.5vw, 1.35rem);
            font-weight: 550;
            cursor: pointer;
          }

          .auth-button svg {
            width: clamp(25px, 4vh, 31px);
            height: clamp(25px, 4vh, 31px);
            flex: 0 0 auto;
          }

          .auth-button:hover,
          .auth-button:focus-visible {
            background: linear-gradient(135deg, #349d3c, #17651f);
            outline: 3px solid rgba(38, 123, 43, 0.22);
            outline-offset: 3px;
          }

          .features {
            margin-top: clamp(18px, 3.2vh, 26px);
            padding-top: clamp(16px, 3vh, 24px);
            border-top: 1px solid var(--line);
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
          }

          .feature {
            min-width: 0;
            padding: 0 clamp(8px, 2vw, 16px);
            text-align: center;
          }

          .feature + .feature { border-left: 1px solid var(--line); }

          .feature svg {
            width: clamp(30px, 5vh, 42px);
            height: clamp(30px, 5vh, 42px);
            display: block;
            margin: 0 auto 8px;
            color: var(--green);
          }

          .feature strong {
            display: block;
            font-family: var(--mono);
            font-size: clamp(0.82rem, 1.6vw, 0.98rem);
            font-weight: 700;
          }

          .feature span {
            display: block;
            margin-top: 6px;
            color: var(--green);
            font-family: var(--mono);
            font-size: clamp(0.72rem, 1.5vw, 0.82rem);
            line-height: 1.35;
          }

          .footer {
            border-top: 1px solid var(--line-strong);
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            font-family: var(--mono);
            font-size: 0.84rem;
          }

          .footer-brand {
            color: var(--green);
            font-weight: 700;
          }

          .footer-copy {
            margin-top: 5px;
            color: var(--ink);
            font-size: 0.76rem;
          }

          .status {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            color: var(--ink);
            white-space: nowrap;
          }

          .status::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #9aa5ad;
          }

          .status-green::before { background: #43a047; }
          .status-yellow::before,
          .status-unknown::before { background: #d6a532; }
          .status-red::before { background: #c94a4a; }

          .basic-login {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            display: grid;
            gap: 12px;
          }

          .basic-login label {
            display: grid;
            gap: 7px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.86rem;
          }

          .basic-login input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            padding: 0 12px;
            color: var(--ink);
            font: inherit;
            background: #fff;
          }

          .basic-login button {
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            color: #fff;
            background: var(--green);
            font: inherit;
            cursor: pointer;
          }

          @media (max-width: 720px) {
            body::before { opacity: 0.32; }
            body::after { opacity: 0.18; }

            .page {
              width: 100%;
              padding: 16px 14px 14px;
              gap: 12px;
            }

            .brand-mark {
              width: clamp(86px, 16vh, 118px);
              max-width: 34vw;
              margin-bottom: 8px;
            }

            .brand-name {
              font-size: clamp(2rem, 9vw, 2.8rem);
            }

            .tagline {
              font-size: clamp(0.86rem, 4vw, 1rem);
            }

            .prompt {
              margin: 14px 0 16px;
              font-size: clamp(0.86rem, 3.6vw, 1rem);
            }

            .auth-card {
              padding: 18px 16px 16px;
              border-radius: 10px;
            }

            .features {
              grid-template-columns: repeat(2, minmax(0, 1fr));
              gap: 16px 0;
              margin-top: 16px;
              padding-top: 16px;
            }

            .feature:nth-child(3) { border-left: 0; }

            .footer {
              padding-top: 10px;
              align-items: flex-start;
              flex-direction: column;
              gap: 8px;
              font-size: 0.78rem;
            }
          }

          @media (max-height: 760px) and (min-width: 721px) {
            .brand-mark { width: clamp(86px, 15vh, 118px); }
            .brand-name { font-size: clamp(2.2rem, 4.5vw, 3rem); }
            .tagline { font-size: 1rem; }
            .prompt { margin: 14px 0 16px; }
            .auth-card { padding-top: 20px; padding-bottom: 18px; }
            .features { margin-top: 16px; padding-top: 16px; }
            .feature span { display: none; }
            .footer-copy { display: none; }
          }

          @media (max-height: 640px) {
            .page { padding-top: 10px; padding-bottom: 10px; gap: 8px; }
            .brand-mark { width: 78px; margin-bottom: 6px; }
            .brand-name { font-size: clamp(1.8rem, 8vw, 2.45rem); }
            .tagline { margin-top: 6px; }
            .prompt { margin: 10px 0 12px; }
            .features { display: none; }
          }
        </style>
      </head>
      <body>
        <main class="page">
          <div class="content">
            <section class="hero" aria-labelledby="brand-title">
              <svg class="brand-mark" viewBox="0 0 300 260" role="img" aria-label="bronneberg.org homelab identity mark">
                <defs>
                  <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#111c26" flood-opacity="0.16"/>
                  </filter>
                </defs>
                <path d="M150 15 260 80v116l-110 64L40 196V80L150 15Z" fill="none" stroke="#267b2b" stroke-width="7" stroke-linejoin="round"/>
                <path d="M79 106 121 142 79 178" fill="none" stroke="#111c26" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)"/>
                <path d="M125 178h38" stroke="#111c26" stroke-width="12" stroke-linecap="round" filter="url(#soft-shadow)"/>
                <g transform="translate(177 82)" stroke="#111c26" stroke-width="6" stroke-linecap="round" fill="none">
                  <circle cx="43" cy="48" r="34"/>
                  <circle cx="43" cy="48" r="9" fill="#fff"/>
                  <path d="M43 8v18M43 70v18M3 48h18M65 48h18M15 20l13 13M58 63l13 13M71 20 58 33M28 63 15 76"/>
                </g>
                <g fill="#267b2b" stroke="#267b2b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M159 216v-31l25-25 25 25v31h-17v-19h-16v19Z"/>
                  <path d="M150 28 189 50" fill="none"/>
                  <circle cx="205" cy="57" r="12"/>
                  <path d="M220 66 245 81" fill="none"/>
                  <circle cx="262" cy="90" r="12"/>
                  <path d="M262 104v60M262 164h-1" fill="none"/>
                  <circle cx="262" cy="176" r="11"/>
                  <path d="M262 187v33" fill="none"/>
                  <path d="M246 231h28v-27c0-9-6-15-14-15s-14 6-14 15Z"/>
                  <path d="M256 231v-12" stroke="#fff"/>
                  <circle cx="256" cy="217" r="3" fill="#fff" stroke="#fff"/>
                  <path d="M298 141v42" fill="none"/>
                  <circle cx="298" cy="141" r="11"/>
                  <path d="M287 184h22v-22c0-7-5-12-11-12s-11 5-11 12Z"/>
                  <path d="M298 184v-9" stroke="#fff"/>
                  <circle cx="298" cy="173" r="2.5" fill="#fff" stroke="#fff"/>
                  <path d="M147 252v-60M147 192h1" fill="none"/>
                  <circle cx="147" cy="186" r="4" fill="#fff"/>
                  <path d="M210 209l18-12" fill="none"/>
                  <circle cx="235" cy="193" r="3"/>
                  <circle cx="251" cy="23" r="3"/>
                  <circle cx="206" cy="7" r="3"/>
                  <path d="M150 43v50l10 14" fill="none"/>
                  <circle cx="150" cy="44" r="3"/>
                  <circle cx="150" cy="95" r="5" fill="#fff"/>
                </g>
              </svg>
              <h1 class="brand-name" id="brand-title">bronneberg<span class="domain">.org</span></h1>
              <p class="tagline">self-hosted identity platform</p>
              <p class="prompt"><span>&gt;_</span> secure session required</p>
            </section>

            <section class="auth-card" aria-label="Authentication">
              {{ if .SignInMessage }}
              <p class="notice">{{.SignInMessage}}</p>
              {{ end}}

              {{ if eq .StatusCode 400 401 }}
              <div class="alert">
                <button class="closebtn" type="button" onclick="this.parentElement.style.display='none';" aria-label="Dismiss">&times;</button>
                {{ if eq .StatusCode 400 }}
                {{.StatusCode}}: Username cannot be empty
                {{ else }}
                {{.StatusCode}}: Invalid Username or Password
                {{ end }}
              </div>
              {{ end }}

              <form method="GET" action="{{.ProxyPrefix}}/start">
                <input type="hidden" name="rd" value="{{.Redirect}}">
                <button type="submit" class="auth-button">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                    <path d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 .1.9 2.1 2.8 1.5.1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.3v3.5c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/>
                  </svg>
                  <span>Continue with {{.ProviderName}}</span>
                </button>
              </form>

              {{ if .CustomLogin }}
              <form method="POST" action="{{.ProxyPrefix}}/sign_in" class="basic-login">
                <input type="hidden" name="rd" value="{{.Redirect}}">
                <label for="username">Username<input type="text" name="username" id="username" autocomplete="username"></label>
                <label for="password">Password<input type="password" name="password" id="password" autocomplete="current-password"></label>
                <button type="submit">Sign in</button>
              </form>
              {{ end }}

              <div class="features" aria-label="Platform traits">
                <div class="feature">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 20 6v6.2c0 5-3.4 8.2-8 9.3-4.6-1.1-8-4.3-8-9.3V6Z"/><rect x="9" y="11" width="6" height="5.5" rx="1"/><path d="M10 11V9.6a2 2 0 0 1 4 0V11"/></svg>
                  <strong>Secure</strong><span>Zero trust<br>access</span>
                </div>
                <div class="feature">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="7.5"/><circle cx="12" cy="12" r="2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/></svg>
                  <strong>Kubernetes</strong><span>Self-hosted<br>at home</span>
                </div>
                <div class="feature">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="5" rx="1.5"/><rect x="4" y="10" width="16" height="5" rx="1.5"/><rect x="4" y="16" width="16" height="4" rx="1.5"/><path d="M8 6.5h5M8 12.5h5M8 18h5M17 6.5h.1M17 12.5h.1M17 18h.1"/></svg>
                  <strong>Homelab</strong><span>Runs in my<br>rack</span>
                </div>
                <div class="feature">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6 13 12 6 18"/><path d="M14 18h4"/></svg>
                  <strong>Open Source</strong><span>Transparent<br>by design</span>
                </div>
              </div>
            </section>
          </div>

          <footer class="footer">
            <div>
              <div class="footer-brand">&gt;_ bronneberg.org</div>
              <div class="footer-copy">self-hosted. secure. sovereign.</div>
            </div>
            <div class="status status-unknown" id="cluster-status" data-status-url="https://status.bronneberg.org/status.json">Checking cluster status</div>
          </footer>
        </main>

        <script>
          if (window.location.hash) {
            (function() {
              var inputs = document.getElementsByName('rd');
              for (var i = 0; i < inputs.length; i++) {
                var idx = inputs[i].value.indexOf('#');
                if (idx >= 0) {
                  inputs[i].value = inputs[i].value.substr(0, idx);
                }
                inputs[i].value += window.location.hash;
              }
            })();
          }

          (function() {
            var statusEl = document.getElementById('cluster-status');
            if (!statusEl || !window.fetch) return;

            function setStatus(text, state) {
              statusEl.textContent = text;
              statusEl.className = 'status status-' + (state || 'unknown');
            }

            fetch(statusEl.getAttribute('data-status-url'), { cache: 'no-store' })
              .then(function(response) {
                if (!response.ok) throw new Error('status fetch failed');
                return response.json();
              })
              .then(function(status) {
                var summary = status.summary;
                if (!summary && status.signals) {
                  summary = status.signals.map(function(signal) { return signal.label; }).join(' · ');
                }
                setStatus(summary || 'Status unavailable', status.state || 'unknown');
              })
              .catch(function() {
                setStatus('Status unavailable', 'yellow');
              });
          })();
        </script>
      </body>
    </html>
