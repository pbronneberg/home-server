apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: github-oauth
spec:
  chain:
    middlewares:
      - name: github-oauth-errors
      - name: github-oauth-forward-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: github-oauth-forward-auth
spec:
  forwardAuth:
    address: http://oauth2-proxy.auth.svc.cluster.local/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: github-oauth-errors
spec:
  errors:
    status:
      - "401-403"
    service:
      name: oauth2-proxy
      namespace: auth
      port: 80
    query: /oauth2/sign_in?rd={url}
