apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: kube-system
data:
  config.json: |-
    {
      "nodePathMap": [
        {
          "node": "milliard",
          "paths": ["/usr/local/data/local-path"]
        },
        {
          "node": "marvin",
          "paths": ["/usr/local/data/local-path"]
        },
        {
          "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths": ["/var/lib/rancher/k3s/storage"]
        }
      ]
    }
  helperPod.yaml: |-
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      containers:
        - name: helper-pod
          image: "rancher/mirrored-library-busybox:1.37.0"
          imagePullPolicy: IfNotPresent
  setup: |-
    #!/bin/sh
    set -eu

    case "${VOL_DIR}" in
      /usr/local/data/local-path/*)
        if [ ! -f "/usr/local/data/local-path/.local-path-ready" ]; then
          echo "worker local-path root is not prepared: /usr/local/data/local-path" >&2
          exit 1
        fi
        ;;
    esac

    mkdir -m 0777 -p "${VOL_DIR}"
    chmod 700 "${VOL_DIR}/.."
  teardown: |-
    #!/bin/sh
    set -eu
    rm -rf "${VOL_DIR}"
