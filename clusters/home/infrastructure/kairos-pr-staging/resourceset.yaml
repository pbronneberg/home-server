  name: kairos-pr-staging
subjects:
  - kind: ServiceAccount
    name: kairos-pr-staging
    namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: kairos-pr-staging
  name: kairos-pr-staging
  namespace: vms
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - batch
