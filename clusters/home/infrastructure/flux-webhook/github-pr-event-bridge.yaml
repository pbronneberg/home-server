apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
rules:
  - apiGroups:
      - fluxcd.controlplane.io
    resources:
      - resourcesetinputproviders
    resourceNames:
      - kairos-pr-staging-pull-requests
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-pr-event-bridge
subjects:
  - kind: ServiceAccount
    name: github-pr-event-bridge
    namespace: flux-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
data:
  bridge.py: |
    #!/usr/bin/env python3
    import datetime
    import hashlib
    import hmac
    import http.client
    import json
    import os
    import ssl
    import sys
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    TOKEN_PATH = os.environ.get("WEBHOOK_TOKEN_PATH", "/var/run/github-webhook/token")
    LABEL = os.environ.get("KAIROS_STAGING_LABEL", "deploy/kairos-staging")
    RECEIVER_NAME = os.environ.get("FLUX_RECEIVER_NAME", "github-webhook")
    RECEIVER_NAMESPACE = os.environ.get("FLUX_RECEIVER_NAMESPACE", "flux-system")
    RECEIVER_HOST = os.environ.get(
        "FLUX_RECEIVER_HOST",
        "webhook-receiver.flux-system.svc.cluster.local",
    )
    RECEIVER_PORT = int(os.environ.get("FLUX_RECEIVER_PORT", "80"))
    TARGET_NAMESPACE = os.environ.get("TARGET_NAMESPACE", "flux-system")
    TARGET_NAME = os.environ.get(
        "TARGET_RESOURCESET_INPUT_PROVIDER",
        "kairos-pr-staging-pull-requests",
    )
    SERVICE_ACCOUNT_TOKEN = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    SERVICE_ACCOUNT_CA = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    def log(message):
        print(message, flush=True)

    def read_file(path):
        with open(path, "r", encoding="utf-8") as handle:
            return handle.read().strip()

    def webhook_token():
        return read_file(TOKEN_PATH)

    def flux_receiver_path(token):
        digest = hashlib.sha256(f"{token}{RECEIVER_NAME}{RECEIVER_NAMESPACE}".encode()).hexdigest()
        return f"/hook/{digest}"

    def verify_signature(headers, body, token):
        signature = headers.get("X-Hub-Signature-256", "")
        if not signature.startswith("sha256="):
            return False
        expected = hmac.new(token.encode(), body, hashlib.sha256).hexdigest()
        supplied = signature.removeprefix("sha256=")
        return hmac.compare_digest(expected, supplied)

    def patch_input_provider():
        now = datetime.datetime.now(datetime.timezone.utc).isoformat(timespec="seconds")
        now = now.replace("+00:00", "Z")
        body = json.dumps({
            "metadata": {
                "annotations": {
                    "reconcile.fluxcd.io/requestedAt": now,
                },
            },
        }).encode()
        kube_token = read_file(SERVICE_ACCOUNT_TOKEN)
        url = (
            "https://kubernetes.default.svc/apis/fluxcd.controlplane.io/v1/"
            f"namespaces/{TARGET_NAMESPACE}/resourcesetinputproviders/{TARGET_NAME}"
        )
        request = urllib.request.Request(
            url,
            data=body,
            method="PATCH",
            headers={
                "Authorization": f"Bearer {kube_token}",
                "Content-Type": "application/merge-patch+json",
            },
        )
        context = ssl.create_default_context(cafile=SERVICE_ACCOUNT_CA)
        with urllib.request.urlopen(request, context=context, timeout=10) as response:
            response.read()
            return response.status

    def forward_to_flux_receiver(body, headers, token):
        path = flux_receiver_path(token)
        forward_headers = {
            "Content-Type": headers.get("Content-Type", "application/json"),
            "Content-Length": str(len(body)),
            "User-Agent": headers.get("User-Agent", "github-pr-event-bridge"),
        }
        for header in (
            "X-GitHub-Event",
            "X-GitHub-Delivery",
            "X-Hub-Signature",
            "X-Hub-Signature-256",
        ):
            value = headers.get(header)
            if value:
                forward_headers[header] = value
        connection = http.client.HTTPConnection(RECEIVER_HOST, RECEIVER_PORT, timeout=10)
        try:
            connection.request("POST", path, body=body, headers=forward_headers)
            response = connection.getresponse()
            response_body = response.read()
            return response.status, response_body
        finally:
            connection.close()

    class Handler(BaseHTTPRequestHandler):
        server_version = "github-pr-event-bridge/1.0"

        def do_GET(self):
            if self.path == "/healthz":
                self.respond(200, b"ok\n")
                return
            self.respond(404, b"not found\n")

        def do_POST(self):
            if self.path != "/github/pr-events":
                self.respond(404, b"not found\n")
                return

            length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(length)
            token = webhook_token()
            event = self.headers.get("X-GitHub-Event", "")
            delivery = self.headers.get("X-GitHub-Delivery", "")

            if not verify_signature(self.headers, body, token):
                log(f"delivery={delivery} event={event} rejected invalid signature")
                self.respond(401, b"invalid signature\n")
                return

            if event in ("ping", "push"):
                status, response_body = forward_to_flux_receiver(body, self.headers, token)
                log(f"delivery={delivery} event={event} forwarded status={status}")
                self.respond(status, response_body or b"forwarded\n")
                return

            if event != "pull_request":
                log(f"delivery={delivery} event={event} ignored")
                self.respond(202, b"ignored\n")
                return

            try:
                payload = json.loads(body)
            except json.JSONDecodeError:
                self.respond(400, b"invalid json\n")
                return

            action = payload.get("action")
            label = (payload.get("label") or {}).get("name")
            number = (payload.get("pull_request") or {}).get("number")
            if action not in ("labeled", "unlabeled") or label != LABEL:
                log(f"delivery={delivery} pr={number} action={action} label={label} ignored")
                self.respond(202, b"ignored\n")
                return

            status = patch_input_provider()
            log(f"delivery={delivery} pr={number} action={action} label={label} patched status={status}")
            self.respond(202, b"resource set input provider reconciled\n")

        def log_message(self, fmt, *args):
            log(f"{self.address_string()} - {fmt % args}")

        def respond(self, status, body):
            self.send_response(status)
            self.send_header("Content-Type", "text/plain; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "8080"))
        server = ThreadingHTTPServer(("0.0.0.0", port), Handler)
        log(f"listening on :{port}")
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            sys.exit(0)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: github-pr-event-bridge
      app.kubernetes.io/name: flux-github-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/component: github-pr-event-bridge
        app.kubernetes.io/name: flux-github-webhook
    spec:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: github-pr-event-bridge
      containers:
        - name: bridge
          image: python:3.13-alpine3.22
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/bridge.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /app
              name: app
              readOnly: true
            - mountPath: /var/run/github-webhook
              name: webhook-token
              readOnly: true
      volumes:
        - configMap:
            defaultMode: 0555
            name: github-pr-event-bridge
          name: app
        - name: webhook-token
          secret:
            secretName: github-webhook-token
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
  labels:
    app.kubernetes.io/component: github-pr-event-bridge
    app.kubernetes.io/name: flux-github-webhook
  name: github-pr-event-bridge
  namespace: flux-system
spec:
  ingressClassName: traefik
  rules:
    - host: ${FLUX_WEBHOOK_HOST}
      http:
        paths:
          - backend:
              service:
                name: github-pr-event-bridge
                port:
                  name: http
            path: /github/pr-events
            pathType: Exact
  tls:
    - hosts:
        - ${FLUX_WEBHOOK_HOST}
      secretName: flux-github-webhook-tls
