apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: example-local
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-local
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: example-local
  namespace: default
spec:
  # Omit this affinity for "any local SSD node". Add a preferred or required
  # hostname when the workload should favor a specific node.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - milliard
  containers:
    - name: shell
      image: busybox:1.37
      command:
        - sh
        - -c
        - sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: example-local
